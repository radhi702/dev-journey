<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
            background: #f5f5f7;
            color: #1d1d1f;
        }
        h1 { font-size: 32px; margin-bottom: 6px; }
        .subtitle { color: #6e6e73; margin-bottom: 32px; }
        form {
            background: white;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.06);
        }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type=url] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            box-sizing: border-box;
        }
        input[type=url]:focus { outline: none; border-color: #0071e3; }
        button {
            margin-top: 16px;
            background: #0071e3;
            color: white;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #0077ed; }
        .hint { font-size: 13px; color: #6e6e73; margin-top: 14px; }
    </style>
</head>
<body>
    <h1>Learning App</h1>
    <p class="subtitle">Paste a YouTube video or article link. Get it in 3 forms: full, notes, simplified.</p>

    <form action="/learn" method="post">
        <label for="url">Link</label>
        <input type="url" id="url" name="url"
               placeholder="https://youtube.com/watch?v=... or https://..."
               required>
        <button type="submit">Learn this for me</button>
        <p class="hint">Takes 5-30 seconds. YouTube videos must have captions turned on.</p>
    </form>
</body>
</html>
